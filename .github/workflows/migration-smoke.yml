name: Migration Gates

on:
  push:
    paths:
      - 'agents/**'
      - 'a0/components/**'
      - '.github/workflows/migration-smoke.yml'
  pull_request:
    paths:
      - 'agents/**'
      - 'a0/components/**'
      - '.github/workflows/migration-smoke.yml'

jobs:
  migration-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit and policy tests
        working-directory: agents
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run migration smoke tests
        working-directory: agents
        run: python migration_smoke_tests.py
